# ===================================================================
# Production Profile 配置
# 激活方式: SPRING_PROFILES_ACTIVE=prod
# ===================================================================

# 飞书渠道 - 生产环境通过环境变量覆盖
channel:
  feishu:
    appId: ${CHANNEL_FEISHU_APPID:}
    appSecret: ${CHANNEL_FEISHU_APPSECRET:}
    robotOpenId: ${CHANNEL_FEISHU_ROBOTOPENID:}
    wakeWord: ${CHANNEL_FEISHU_WAKEWORD:}
    whitelist: ${CHANNEL_FEISHU_WHITELIST:}

# Dragon Store 类型: MYSQL (通过 DRAGON_STORE_TYPE 环境变量控制)
dragon:
  store:
    enabled: true
    type: ${DRAGON_STORE_TYPE:MYSQL}
  default-character-id: ${DRAGON_DEFAULT_CHARACTER_ID:}
  memory:
    # Memory storage type: file, mysql, or memory (default: file)
    type: file
    # Base directory for file storage
    base-dir: ${DRAGON_MEMORY_BASE_DIR:./data/memories}
    # Character memory directory pattern
    character-dir-pattern: ${DRAGON_MEMORY_CHARACTER_DIR_PATTERN:characters/%s/mem}
    # Workspace memory directory pattern
    workspace-dir-pattern: ${DRAGON_MEMORY_WORKSPACE_DIR_PATTERN:workspaces/%s/mem}
    # Session memory directory pattern
    session-dir-pattern: ${DRAGON_MEMORY_SESSION_DIR_PATTERN:sessions/%s}
    # Memory index file name
    index-file-name: MEMORY.md
    # File encoding for memory files
    encoding: UTF-8
    # Maximum size of memory content (in characters)
    max-content-length: 10000
    # Maximum number of memory entries per character/workspace
    max-entries: 1000

# LLM 配置
llm:
  minimax:
    apiKey: ${LLM_MINIMAX_APIKEY:}
    groupId: ${LLM_MINIMAX_GROUPID:}
  kimi:
    apiKey: ${LLM_KIMI_APIKEY:}
  deepseek:
    apiKey: ${LLM_DEEPSEEK_APIKEY:}
