spring.application.name=dragon-head

# 飞书渠道配置
channel.feishu.appId=cli_a93e931566785bcc
channel.feishu.appSecret=${FEISHU_APP_SECRET:}
channel.feishu.robotOpenId=ou_ee35d0ed85f54152cb2cce7b2d363431
channel.feishu.whitelist=ou_ac7b80fe089073ac4354472602fc1862
channel.feishu.wakeWord=help
channel.feishu.whitelist.enabled=false

# Minimax LLM 配置
llm.minimax.apiKey=${MINIMAX_API_KEY:}
llm.minimax.baseUrl=https://api.minimax.chat
llm.minimax.model=abab6.5s-chat
llm.minimax.groupId=${MINIMAX_GROUP_ID:}

# Kimi LLM 配置
llm.kimi.apiKey=${KIMI_API_KEY:}
llm.kimi.baseUrl=https://api.moonshot.cn/v1
llm.kimi.model=moonshot-v1-8k-online

# DeepSeek LLM 配置
llm.deepseek.apiKey=${DEEPSEEK_API_KEY:}
llm.deepseek.baseUrl=https://api.deepseek.com
llm.deepseek.model=deepseek-chat

# H2 数据源配置 (默认)
spring.datasource.h2.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.h2.username=sa
spring.datasource.h2.password=
spring.datasource.h2.driver-class-name=org.h2.Driver
spring.datasource.h2.hikariMaximumPoolSize=10

# MySQL 数据源配置 (ChatMessage存储)
spring.datasource.mysql.url=jdbc:mysql://localhost:3306/adeptify?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.mysql.username=root
spring.datasource.mysql.password=123456
spring.datasource.mysql.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.mysql.hikariMaximumPoolSize=10

# Flyway 配置 (使用MySQL)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Skill 存储配置
skill.storage.backend=local
skill.storage.local.root-dir=/data/skills

# Skill 执行配置
skill.execution.sandbox-dir=/tmp/agent-sandbox/skills

# Sandbox 配置
sandbox.root-dir=/tmp/agent-sandbox
sandbox.execution.default-timeout-seconds=30
sandbox.execution.max-output-length=102400

# Store 配置
dragon.store.enabled=true
dragon.store.type=MYSQL